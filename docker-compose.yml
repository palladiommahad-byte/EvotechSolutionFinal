services:
  postgres:
    image: postgres:15
    container_name: evotech_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=HelloFace34
      - POSTGRES_DB=EvotechSolution
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: evotech_server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_USER=postgres
      - DB_PASSWORD=HelloFace34
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=EvotechSolution
      - JWT_SECRET=evotech_secret_key_2026
      - CORS_ORIGIN=*
      - BACKUP_DIR=/app/backups
    volumes:
      - ./backups:/app/backups
    depends_on:
      - postgres
    restart: always

  client:
    build: ./frontend
    container_name: evotech_client
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - server
    restart: always

volumes:
  pgdata:
